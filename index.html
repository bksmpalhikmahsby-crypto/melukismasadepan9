<style>
:root{
  --canvas:#F6F1E7;
  --ink:#2B2118;
  --ink-soft:#6B5D4F;
  --line:#DCD2BE;
  --teal:#2F6F62;
  --teal-deep:#1E4B41;
  --terracotta:#C1622E;
  --terracotta-deep:#8C4520;
  --gold:#C99A3A;
  --card:#FFFDF8;
  --error:#B3432B;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--canvas);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  line-height:1.55;
}
.wrap{max-width:760px;margin:0 auto;padding:32px 20px 80px;}
.brushline{height:6px;border-radius:6px;background:linear-gradient(90deg,var(--terracotta),var(--gold),var(--teal));margin-bottom:28px;}
header.hero{margin-bottom:32px;}
header.hero .eyebrow{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--terracotta-deep);font-weight:600;margin-bottom:6px;}
header.hero h1{font-family:'Fraunces',serif;font-size:38px;font-weight:600;margin:0 0 10px;line-height:1.1;}
header.hero p{color:var(--ink-soft);font-size:15px;max-width:540px;margin:0;}
.progress{display:flex;gap:8px;margin:26px 0 0;}
.progress div{flex:1;height:4px;border-radius:4px;background:var(--line);}
.progress div.active{background:var(--terracotta);}
.progress div.done{background:var(--teal);}

.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px;margin-bottom:20px;}
.card h2{font-family:'Fraunces',serif;font-size:22px;font-weight:600;margin:0 0 4px;}
.card .sub{color:var(--ink-soft);font-size:14px;margin:0 0 22px;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.grid2{grid-template-columns:1fr;}}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;font-weight:500;color:var(--ink-soft);margin-bottom:6px;}
.field input,.field select{
  width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;
  font-size:15px;font-family:inherit;background:#fff;color:var(--ink);
}
.field input:focus,.field select:focus{outline:2px solid var(--teal);outline-offset:1px;border-color:var(--teal);}
.hint{font-size:12px;color:var(--ink-soft);margin-top:4px;}
.readonly{background:var(--canvas);color:var(--ink-soft);}

.choice-tabs{display:flex;gap:10px;margin-bottom:20px;}
.choice-tabs button{
  flex:1;padding:14px;border:1px solid var(--line);border-radius:10px;background:#fff;
  font-family:inherit;font-size:14px;font-weight:500;color:var(--ink-soft);cursor:pointer;
}
.choice-tabs button.active{border-color:var(--terracotta);background:#FBEFE6;color:var(--terracotta-deep);}

.pick-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;max-height:340px;overflow-y:auto;padding-right:4px;}
@media(max-width:600px){.pick-grid{grid-template-columns:1fr 1fr;}}
.pick-card{
  border:1px solid var(--line);border-radius:10px;padding:12px 10px;text-align:left;background:#fff;
  cursor:pointer;font-family:inherit;font-size:13.5px;color:var(--ink);
}
.pick-card .kat{display:block;font-size:11px;color:var(--ink-soft);margin-top:3px;}
.pick-card.selected{border-color:var(--teal);background:#EBF4F1;}
.pick-card.selected .kat{color:var(--teal-deep);}

.actions{display:flex;justify-content:space-between;gap:10px;margin-top:8px;}
button.btn{
  font-family:inherit;font-size:14.5px;font-weight:500;padding:12px 22px;border-radius:9px;cursor:pointer;border:none;
}
button.btn.primary{background:var(--terracotta);color:#fff;}
button.btn.primary:hover{background:var(--terracotta-deep);}
button.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink-soft);}
button.btn.ghost:hover{border-color:var(--ink-soft);}
button.btn:disabled{opacity:.45;cursor:not-allowed;}

.result-block{border-top:1px solid var(--line);padding-top:18px;margin-top:6px;}
.result-row{display:grid;grid-template-columns:170px 1fr;gap:6px 16px;padding:10px 0;border-bottom:1px solid var(--line);font-size:14.5px;}
.result-row:last-child{border-bottom:none;}
.result-row .lbl{color:var(--terracotta-deep);font-weight:600;font-size:13px;letter-spacing:.02em;text-transform:uppercase;}
.result-row .val{color:var(--ink);}
.idrecap{font-size:13.5px;color:var(--ink-soft);margin-bottom:18px;}
.idrecap b{color:var(--ink);}

.error{color:var(--error);font-size:13px;margin-top:4px;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--teal-deep);color:#fff;padding:10px 18px;border-radius:30px;font-size:13.5px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50;}
.toast.show{opacity:1;}

.linklike{background:none;border:none;color:var(--ink-soft);font-size:12.5px;text-decoration:underline;cursor:pointer;font-family:inherit;padding:0;}
footer.note{text-align:center;margin-top:36px;color:var(--ink-soft);font-size:12px;}

table.rekap{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:14px;}
table.rekap th,table.rekap td{border:1px solid var(--line);padding:6px 8px;text-align:left;}
table.rekap th{background:var(--canvas);}

@media print{
  body{background:#fff;}
  .wrap{max-width:100%;padding:10px 20px;}
  .no-print{display:none !important;}
  .card{box-shadow:none;border:1px solid #999;}
  .brushline{background:#999;}
}
</style>

// Akses rekap dibuka cukup lewat ?bk=1 di akhir URL, tanpa PIN.

function isBkMode(){
  try{ return new URLSearchParams(window.location.search).get("bk") === "1"; }catch(e){ return false; }
}

let state = {
  step: 0,
  id: { nama:"", panggilan:"", absen:"", kelas:"", jk:"", tglPelaksanaan: new Date().toISOString().slice(0,10), tglLahir:"" },
  mode: null,
  pilihan: null,
  jenjang: null,
  sekolahUtama: "",
  sekolahKedua: "",
  savedKey: null,
  view: "app"
};

const JENJANG_LIST = ["SMA Negeri","SMA Swasta","SMK","Kedinasan","Pondok Pesantren","Boarding School"];

function usia(tglLahir, tglPelaksanaan){
  if(!tglLahir || !tglPelaksanaan) return "";
  const a = new Date(tglLahir), b = new Date(tglPelaksanaan);
  if(isNaN(a) || isNaN(b) || a > b) return "";
  let years = b.getFullYear() - a.getFullYear();
  let months = b.getMonth() - a.getMonth();
  if(b.getDate() < a.getDate()) months--;
  if(months < 0){ years--; months += 12; }
  return years + " tahun " + months + " bulan";
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function el(html){
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.firstElementChild;
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = "";
  if(isBkMode()){
    state.view = "rekap";
    app.appendChild(renderRekap());
    return;
  }
  if(state.view === "rekap") state.view = "app";
  app.appendChild(renderHeader());
  if(state.step === 0) app.appendChild(renderIdentitas());
  if(state.step === 1) app.appendChild(renderEksplorasi());
  if(state.step === 2) app.appendChild(renderHasil());
  app.appendChild(renderFooter());
}

function renderHeader(){
  const wrap = document.createElement('div');
  wrap.className = "no-print";
  wrap.innerHTML = `
    <div class="brushline"></div>
    <header class="hero">
      <div class="eyebrow">Bimbingan Konseling &middot; Kelas 9</div>
      <h1>Melukis Masa Depan</h1>
      <p>Setiap warna yang kamu pilih hari ini membantu menggambar arah masa depanmu. Yuk, mulai melukis langkah pertamamu menuju SMA, SMK, sekolah kedinasan, pondok pesantren, atau jalur kuliahmu nanti.</p>
    </header>
    <div class="progress">
      <div class="${state.step>=0?'active':''} ${state.step>0?'done':''}"></div>
      <div class="${state.step>=1?'active':''} ${state.step>1?'done':''}"></div>
      <div class="${state.step>=2?'active':''}"></div>
    </div>
  `;
  return wrap;
}

        </select>
      </div>
      <div class="field"><label>Jenis kelamin</label>
        <select id="f-jk">
          <option value="">Pilih</option>
          <option value="Laki-laki" ${state.id.jk==="Laki-laki"?'selected':''}>Laki-laki</option>
          <option value="Perempuan" ${state.id.jk==="Perempuan"?'selected':''}>Perempuan</option>
        </select>
      </div>
      <div class="field"><label>Tanggal pelaksanaan</label><input id="f-tglpel" type="date" value="${state.id.tglPelaksanaan}"></div>
      <div class="field"><label>Tanggal lahir</label><input id="f-tgllahir" type="date" value="${state.id.tglLahir}"></div>
      <div class="field">
        <label>Usia (otomatis)</label>
        <input class="readonly" id="f-usia" value="${usia(state.id.tglLahir, state.id.tglPelaksanaan)}" readonly placeholder="Terisi otomatis">
      </div>
    </div>
    <div id="id-error" class="error"></div>
    <div class="actions">
      <span></span>
      <button class="btn primary" id="next1">Lanjut: eksplorasi cita-cita →</button>
    </div>
  `;
  ["nama","panggilan","absen","kelas","jk","tglpel","tgllahir"].forEach(k=>{
    const map = {tglpel:"tglPelaksanaan", tgllahir:"tglLahir"};
    const key = map[k] || k;
    const node = c.querySelector("#f-"+k);
    node.addEventListener("input", ()=>{
      state.id[key] = node.value;
      if(key==="tglLahir" || key==="tglPelaksanaan"){
        c.querySelector("#f-usia").value = usia(state.id.tglLahir, state.id.tglPelaksanaan);

    if(missing.length){
      c.querySelector("#id-error").textContent = "Lengkapi dulu semua data identitas sebelum lanjut.";
      return;
    }
    state.step = 1;
    render();
  });
  return c;
}

function renderEksplorasi(){
  const c = el(`<div class="card"></div>`);
  const modeSudah = state.mode === "sudah";
  const modeBingung = state.mode === "bingung";
  c.innerHTML = `
    <h2>Eksplorasi cita-cita</h2>
    <p class="sub">Pilih salah satu jalan untuk mulai melukis arah masa depanmu.</p>
    <div class="field">
      <label>Jenjang pendidikan lanjutan yang paling ingin kamu tuju</label>

        <option value="">Pilih jenjang</option>
        ${JENJANG_LIST.map(j=>`<option value="${j}" ${state.jenjang===j?'selected':''}>${j}</option>`).join("")}
      </select>
    </div>
    <div class="field">
      <label>Sebutkan jenjang pendidikan lanjutan yang utama kamu inginkan</label>
      <input id="f-sekolah-utama" value="${state.sekolahUtama}" placeholder="Contoh: SMA Al Hikmah Surabaya">
    </div>
    <div class="field">
      <label>Sebutkan jenjang pendidikan lanjutan pilihan kedua yang kamu inginkan</label>
      <input id="f-sekolah-kedua" value="${state.sekolahKedua}" placeholder="Contoh: SMA Boarding School Al Hikmah Batu">
    </div>
    <div class="choice-tabs">
      <button id="tab-sudah" class="${modeSudah?'active':''}">Saya sudah punya cita-cita</button>
      <button id="tab-bingung" class="${modeBingung?'active':''}">Saya belum tahu, tapi saya suka...</button>
    </div>
    <div id="pick-area"></div>
    <div id="eksplor-error" class="error"></div>
    <div class="actions">
      <button class="btn ghost" id="back0">← Kembali</button>
      <button class="btn primary" id="next2">Lihat hasil →</button>
    </div>
  `;
  c.querySelector("#f-jenjang").addEventListener("change", (e)=>{ state.jenjang = e.target.value; });
  c.querySelector("#f-sekolah-utama").addEventListener("input", (e)=>{ state.sekolahUtama = e.target.value; });
  c.querySelector("#f-sekolah-kedua").addEventListener("input", (e)=>{ state.sekolahKedua = e.target.value; });
  const pickArea = c.querySelector("#pick-area");
  function drawPicker(){
    const list = state.mode === "sudah" ? CITACITA_DB : BIDANG_DB;
    const label = state.mode === "sudah" ? "Pilih cita-citamu, atau ketik sendiri jika tidak ada di daftar" : "Pilih bidang yang membuatmu paling semangat";
    pickArea.innerHTML = `
      <div class="field"><label>${label}</label>
        <input id="search-box" placeholder="Ketik untuk mencari, atau tulis cita-citamu sendiri...">
      </div>
      <div class="pick-grid" id="pick-grid"></div>
    `;
    const grid = pickArea.querySelector("#pick-grid");
    function drawGrid(filter){
      const f = (filter||"").toLowerCase();
      const items = list.filter(it => it.n.toLowerCase().includes(f));
      grid.innerHTML = items.map((it,i)=>{
        const idx = list.indexOf(it);
        const selected = state.pilihan && state.pilihan.custom!==true && state.pilihan.n === it.n;
        return `<button class="pick-card ${selected?'selected':''}" data-idx="${idx}">${it.n.split(' — ')[0].split(' (')[0]}<span class="kat">${it.k}</span></button>`;
      }).join("");
      grid.querySelectorAll(".pick-card").forEach(btn=>{
        btn.addEventListener("click", ()=>{
          const item = list[parseInt(btn.dataset.idx)];
          state.pilihan = Object.assign({}, item, {custom:false, sumber: state.mode});
          render();
        });
      });
    }
    drawGrid("");
    pickArea.querySelector("#search-box").addEventListener("input", (e)=>{
      drawGrid(e.target.value);
    });
    pickArea.querySelector("#search-box").addEventListener("keydown", (e)=>{
      if(e.key === "Enter" && e.target.value.trim()){
        state.pilihan = { n: e.target.value.trim(), k:"Eksplorasi mandiri", sma:"Perlu didiskusikan bersama guru BK", smk:"Perlu didiskusikan bersama guru BK", ked:"Perlu didiskusikan bersama guru BK", pon:"Perlu didiskusikan bersama guru BK", kul:"Perlu didiskusikan bersama guru BK", custom:true, sumber: state.mode };
        render();
      }
    });
  }
  if(state.mode) drawPicker();
  c.querySelector("#tab-sudah").addEventListener("click", ()=>{ state.mode = "sudah"; state.pilihan=null; render(); });
  c.querySelector("#tab-bingung").addEventListener("click", ()=>{ state.mode = "bingung"; state.pilihan=null; render(); });
  c.querySelector("#back0").addEventListener("click", ()=>{ state.step = 0; render(); });
  c.querySelector("#next2").addEventListener("click", ()=>{
    if(!state.jenjang){
      c.querySelector("#eksplor-error").textContent = "Pilih dulu jenjang pendidikan lanjutan yang kamu tuju.";
      return;
    }
    if(!state.sekolahUtama || !state.sekolahUtama.trim()){
      c.querySelector("#eksplor-error").textContent = "Sebutkan dulu sekolah pilihan utamamu.";
      return;
    }
    if(!state.pilihan){
      c.querySelector("#eksplor-error").textContent = "Pilih dulu cita-cita atau bidang minatmu.";
      return;
    }
    state.step = 2; render(); saveResult();
  });
  return c;
}

async function saveResult(){
  const submissionId = "S" + Date.now() + "-" + Math.random().toString(36).slice(2,7);
  const record = { submissionId, id: state.id, mode: state.mode, jenjang: state.jenjang, sekolahUtama: state.sekolahUtama, sekolahKedua: state.sekolahKedua, pilihan: state.pilihan, waktu: new Date().toISOString() };
  try{
    const histori = JSON.parse(localStorage.getItem("melukis_riwayat") || "[]");
    histori.push(record);
    localStorage.setItem("melukis_riwayat", JSON.stringify(histori));
    state.savedKey = submissionId;
  }catch(e){
    console.error("Gagal menyimpan ke penyimpanan perangkat", e);
  }
  sendToSheet(record);
  toast("Hasil tersimpan");
}

function sendToSheet(record){
  if(!SHEET_WEBHOOK_URL || !SHEET_WEBHOOK_URL.startsWith("http")) return;
  try{
    fetch(SHEET_WEBHOOK_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(record)
    }).catch(err=> console.error("Gagal mengirim ke Google Sheets", err));
  }catch(e){
    console.error("Gagal mengirim ke Google Sheets", e);
  }
}

async function sendAction(payload){
  if(!SHEET_WEBHOOK_URL || !SHEET_WEBHOOK_URL.startsWith("http")) return;
  try{
    await fetch(SHEET_WEBHOOK_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
  }catch(e){ console.error("Gagal mengirim aksi ke Google Sheets", e); }
}

function mapSheetRow(o){
  return {
    submissionId: o["ID"],
    waktu: o["Waktu"],
    id: { nama:o["Nama"], panggilan:o["Panggilan"], kelas:o["Kelas"], absen:String(o["Absen"]), jk:o["Jenis Kelamin"], tglLahir:o["Tanggal Lahir"], tglPelaksanaan:o["Tanggal Pelaksanaan"] },
    mode: o["Mode"],
    jenjang: o["Jenjang Lanjutan"],
    sekolahUtama: o["Sekolah Pilihan Utama"],
    sekolahKedua: o["Sekolah Pilihan Kedua"],
    pilihan: { n:o["Cita-cita / Minat"], k:o["Kategori"], sma:o["SMA"], smk:o["SMK"], ked:o["Kedinasan"], pon:o["Pondok"], kul:o["Kuliah"] }
  };
}

async function fetchAllRows(){
  if(!SHEET_WEBHOOK_URL || !SHEET_WEBHOOK_URL.startsWith("http")) return [];
  const res = await fetch(SHEET_WEBHOOK_URL + "?action=list");
  const data = await res.json();
  const rows = (Array.isArray(data) ? data : []).map(mapSheetRow).filter(r=> r.id.nama);
  rows.sort((a,b)=> new Date(a.waktu) - new Date(b.waktu));
  return rows;
}

async function loadRekap(c){
  const status = c.querySelector("#rekap-status");
  try{
    const rows = await fetchAllRows();
    if(!rows.length){
      status.innerHTML = "<p>Belum ada data siswa yang tersimpan di Google Sheets.</p>";
      ["dl-csv","dl-xlsx","btn-print-rekap","btn-hapus-semua"].forEach(id=>{ const b=c.querySelector("#"+id); if(b) b.disabled = true; });
      return;
    }
    status.innerHTML = `
      <table class="rekap">
        <thead><tr><th class="no-print">Hapus</th><th>Nama</th><th>Kelas</th><th>Absen</th><th>JK</th><th>Usia</th><th>Jenjang lanjutan</th><th>Sekolah pilihan utama</th><th>Sekolah pilihan kedua</th><th>${'Cita-cita / minat'}</th><th>SMA</th><th>SMK</th><th>Kedinasan</th><th>Pondok</th><th>Kuliah</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr data-sid="${r.submissionId}">
            <td class="no-print"><button class="linklike btn-del-row" style="color:var(--error);" data-sid="${r.submissionId}" data-nama="${r.id.nama}">Hapus</button></td>
            <td>${r.id.nama}</td><td>${r.id.kelas}</td><td>${r.id.absen}</td><td>${r.id.jk}</td>
            <td>${usia(r.id.tglLahir, r.id.tglPelaksanaan)}</td>
            <td>${r.jenjang||'-'}</td>
            <td>${r.sekolahUtama||'-'}</td>
            <td>${r.sekolahKedua||'-'}</td>
            <td>${r.pilihan.n}</td><td>${r.pilihan.sma}</td><td>${r.pilihan.smk}</td><td>${r.pilihan.ked}</td><td>${r.pilihan.pon}</td><td>${r.pilihan.kul}</td>
          </tr>`).join("")}
        </tbody>
      </table>
      <p class="hint">Total: ${rows.length} pengisian</p>
    `;
    status.querySelectorAll(".btn-del-row").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        if(!window.confirm("Hapus hasil milik " + btn.dataset.nama + "?")) return;
        await sendAction({ action:"delete", submissionId: btn.dataset.sid });
        toast("Menghapus data...");
        setTimeout(()=> render(), 1200);
      });
    });
    c.querySelector("#dl-csv").addEventListener("click", ()=> downloadCSV(rows));
    c.querySelector("#dl-xlsx").addEventListener("click", ()=> downloadXLSX(rows));
  }catch(e){
    console.error(e);
    status.innerHTML = "<p>Gagal memuat data rekap dari Google Sheets. Pastikan URL webhook aktif, lalu coba \"Muat ulang data\".</p>";
  }
}

const KELAS_LIST = ["9A","9B","9C","9D","9E","9F","9G","9H","9I","9J"];

async function loadAnalisis(c){
  const status = c.querySelector("#rekap-status");
  try{
    const rows = await fetchAllRows();
    if(!rows.length){
      status.innerHTML = "<p>Belum ada data siswa yang tersimpan.</p>";
      return;
    }

    let totalSiswa = {};
    try{
      totalSiswa = JSON.parse(localStorage.getItem("melukis_totalSiswa") || "{}");
    }catch(e){}

    const byStudent = {};
    rows.forEach(r=>{
      const key = (r.id.nama||"").trim().toLowerCase() + "|" + (r.id.kelas||"").trim() + "|" + (r.id.absen||"").trim();
      if(!byStudent[key]) byStudent[key] = { nama:r.id.nama, kelas:r.id.kelas, absen:r.id.absen, entries: [] };
      byStudent[key].entries.push(r);
    });

    const perKelas = {};
    KELAS_LIST.forEach(k=> perKelas[k] = { siswaUnik: new Set(), kategori: {}, jenjang: {} });
    Object.values(byStudent).forEach(s=>{
      const k = s.kelas;
      if(!perKelas[k]) perKelas[k] = { siswaUnik: new Set(), kategori: {}, jenjang: {} };
      perKelas[k].siswaUnik.add(s.nama.trim().toLowerCase()+"|"+s.absen);
      const last = s.entries[s.entries.length-1];
      const kat = last.pilihan.k;
      perKelas[k].kategori[kat] = (perKelas[k].kategori[kat] || 0) + 1;
      const jen = last.jenjang || "Belum diisi";
      perKelas[k].jenjang[jen] = (perKelas[k].jenjang[jen] || 0) + 1;
    });

    const bingung = Object.values(byStudent).filter(s=>{
      const distinct = new Set(s.entries.map(e=> e.pilihan.n.trim().toLowerCase()));
      return distinct.size > 1;
    });

    const kelasRows = KELAS_LIST.map(k=>{
      const data = perKelas[k] || { siswaUnik:new Set(), kategori:{} };
      const isi = data.siswaUnik.size;
      const total = totalSiswa[k] ? parseInt(totalSiswa[k]) : null;
      const pct = total ? Math.round((isi/total)*100) : null;
      const katEntries = Object.entries(data.kategori).sort((a,b)=> b[1]-a[1]);
      const totalKat = katEntries.reduce((s,e)=> s+e[1], 0);
      const katStr = katEntries.length ? katEntries.map(([nm,jml])=> nm + " " + Math.round((jml/totalKat)*100) + "%").join(", ") : "-";
      return `<tr>
        <td>${k}</td>
        <td>${isi}</td>
        <td><input type="number" min="0" data-kelas="${k}" class="tot-input" value="${total!==null?total:''}" style="width:64px;padding:4px 6px;"></td>
        <td>${pct!==null?pct+'%':'-'}</td>
        <td style="font-size:12px;">${katStr}</td>
      </tr>`;
    }).join("");

    const jenjangRows = KELAS_LIST.map(k=>{
      const data = perKelas[k] || { jenjang:{} };
      const jenEntries = Object.entries(data.jenjang || {}).sort((a,b)=> b[1]-a[1]);
      const totalJen = jenEntries.reduce((s,e)=> s+e[1], 0);
      const jenStr = jenEntries.length ? jenEntries.map(([nm,jml])=> nm + " " + Math.round((jml/totalJen)*100) + "% (" + jml + " siswa)").join(", ") : "-";
      return `<tr><td>${k}</td><td style="font-size:12px;">${jenStr}</td></tr>`;
    }).join("");

    status.innerHTML = `
      <h3 style="font-family:'Fraunces',serif;font-size:17px;margin:18px 0 8px;">Persentase pengisian & distribusi kategori per kelas</h3>
      <p class="hint">Isi kolom "total siswa" tiap kelas untuk melihat persentase pengisian, lalu klik simpan. (Tersimpan di browser ini saja — isi ulang jika membuka dari perangkat/browser lain.)</p>
      <table class="rekap">
        <thead><tr><th>Kelas</th><th>Sudah mengisi (siswa unik)</th><th>Total siswa</th><th>% mengisi</th><th>Distribusi kategori cita-cita/minat</th></tr></thead>
        <tbody>${kelasRows}</tbody>
      </table>
      <div style="margin:10px 0 28px;"><button class="btn ghost" id="save-total">Simpan total siswa per kelas</button></div>

      <h3 style="font-family:'Fraunces',serif;font-size:17px;margin:18px 0 8px;">Persentase pilihan jenjang pendidikan lanjutan per kelas</h3>
      <p class="hint">Dihitung dari pilihan jenjang (SMA Negeri/SMA Swasta/SMK/Kedinasan/Pondok Pesantren/Boarding School) terakhir tiap siswa.</p>
      <table class="rekap">
        <thead><tr><th>Kelas</th><th>Distribusi pilihan jenjang</th></tr></thead>
        <tbody>${jenjangRows}</tbody>
      </table>

      <h3 style="font-family:'Fraunces',serif;font-size:17px;margin:18px 0 8px;">Siswa dengan lebih dari satu cita-cita berbeda</h3>
      <p class="hint">Siswa di bawah ini mengisi platform lebih dari sekali dengan cita-cita/minat yang berbeda-beda — kemungkinan masih bingung dan perlu pendampingan lanjutan.</p>
      ${bingung.length ? `
      <table class="rekap">
        <thead><tr><th>Nama</th><th>Kelas</th><th>Absen</th><th>Jumlah pengisian</th><th>Cita-cita/minat yang pernah diisi</th></tr></thead>
        <tbody>
          ${bingung.map(s=>`<tr>
            <td>${s.nama}</td><td>${s.kelas}</td><td>${s.absen}</td><td>${s.entries.length}</td>
            <td>${s.entries.map(e=> e.pilihan.n + " <span class='hint' style='display:inline'>(" + new Date(e.waktu).toLocaleDateString('id-ID') + ")</span>").join("; ")}</td>
          </tr>`).join("")}
        </tbody>
      </table>
      <p class="hint">Total: ${bingung.length} siswa terindikasi belum yakin dengan cita-citanya.</p>
      ` : `<p class="hint">Belum ada siswa yang mengisi lebih dari satu cita-cita berbeda.</p>`}
    `;

    const saveBtn = status.querySelector("#save-total");
    if(saveBtn) saveBtn.addEventListener("click", ()=>{
      const inputs = status.querySelectorAll(".tot-input");
      const cfg = {};
      inputs.forEach(inp=>{ if(inp.value) cfg[inp.dataset.kelas] = inp.value; });
      try{
        localStorage.setItem("melukis_totalSiswa", JSON.stringify(cfg));
        toast("Total siswa per kelas tersimpan di browser ini");
        loadAnalisis(c);
      }catch(e){
        console.error(e);
        toast("Gagal menyimpan total siswa");
      }
    });
  }catch(e){
    console.error(e);
    status.innerHTML = "<p>Gagal memuat data analisis. Coba muat ulang halaman.</p>";
  }
}

function downloadXLSX(rows){
  const headers = ["Nama","Panggilan","Kelas","Absen","Jenis Kelamin","Tanggal Lahir","Tanggal Pelaksanaan","Usia","Jenjang Lanjutan","Sekolah Pilihan Utama","Sekolah Pilihan Kedua","Mode","Cita-cita/Minat","Kategori","SMA","SMK","Kedinasan","Pondok","Kuliah"];
  const data = rows.map(r=> [r.id.nama, r.id.panggilan, r.id.kelas, r.id.absen, r.id.jk, r.id.tglLahir, r.id.tglPelaksanaan, usia(r.id.tglLahir, r.id.tglPelaksanaan), r.jenjang||"", r.sekolahUtama||"", r.sekolahKedua||"", r.mode, r.pilihan.n, r.pilihan.k, r.pilihan.sma, r.pilihan.smk, r.pilihan.ked, r.pilihan.pon, r.pilihan.kul]);
  if(typeof XLSX === "undefined"){ toast("Gagal memuat modul Excel, coba muat ulang halaman."); return; }
  const ws = XLSX.utils.aoa_to_sheet([headers, ...data]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Rekap");
  XLSX.writeFile(wb, "rekap-melukis-masa-depan.xlsx");
}

function downloadCSV(rows){
  const headers = ["Nama","Panggilan","Kelas","Absen","Jenis Kelamin","Tanggal Lahir","Tanggal Pelaksanaan","Usia","Jenjang Lanjutan","Sekolah Pilihan Utama","Sekolah Pilihan Kedua","Mode","Cita-cita/Minat","Kategori","SMA","SMK","Kedinasan","Pondok","Kuliah"];
  const lines = [headers.join(",")];
  rows.forEach(r=>{
    const vals = [r.id.nama, r.id.panggilan, r.id.kelas, r.id.absen, r.id.jk, r.id.tglLahir, r.id.tglPelaksanaan, usia(r.id.tglLahir, r.id.tglPelaksanaan), r.jenjang||"", r.sekolahUtama||"", r.sekolahKedua||"", r.mode, r.pilihan.n, r.pilihan.k, r.pilihan.sma, r.pilihan.smk, r.pilihan.ked, r.pilihan.pon, r.pilihan.kul];
    lines.push(vals.map(v=> '"' + String(v||"").replace(/"/g,'""') + '"').join(","));
  });
  const blob = new Blob([lines.join("\n")], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "rekap-melukis-masa-depan.csv";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

render();
